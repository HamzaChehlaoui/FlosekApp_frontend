<app-header></app-header>
<div class="profile-page">
  <div class="profile-content">

    <!-- Profile Header -->
    <div class="profile-header">
      <div class="avatar">{{ userInitials }}</div>
      <button class="edit-profile-btn" (click)="toggleEditMode()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
        </svg>
        Edit Profile
      </button>
    </div>

    <div class="user-info">
      <h1 class="user-name">{{ fullName }}</h1>
      <p class="user-email">{{ user?.email }}</p>
    </div>

    <!-- Main Content Grid -->
    <div class="main-grid">
      <!-- Left Column: Personal Information -->
      <div class="column">
        <h2 class="section-title">Personal Information</h2>

        <div class="form-row">
          <div class="form-group">
            <input type="text"
                   [value]="user?.firstName"
                   placeholder="Full Name"
                   [readonly]="!isEditMode"
                   [(ngModel)]="profileForm.firstName">
          </div>
          <div class="form-group">
            <input type="text"
                   [value]="user?.lastName"
                   placeholder="Full Name"
                   [readonly]="!isEditMode"
                   [(ngModel)]="profileForm.lastName">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <input type="email"
                   [value]="user?.email"
                   placeholder="Email Address"
                   [readonly]="!isEditMode"
                   [(ngModel)]="profileForm.email">
          </div>
          <div class="form-group">
            <select [disabled]="!isEditMode" [(ngModel)]="profileForm.country">
              <option value="Morocco">Morocco</option>
              <option value="USA">United States</option>
              <option value="UK">United Kingdom</option>
              <option value="France">France</option>
              <option value="Germany">Germany</option>
              <option value="Spain">Spain</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <input type="tel"
                   placeholder="Phone Number"
                   [readonly]="!isEditMode"
                   [(ngModel)]="profileForm.phone">
          </div>
          <div class="form-group">
            <button class="btn-change-password" (click)="openChangePassword()">
              Change Password
            </button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group country-display">
            <span class="label">Country</span>
            <span class="value">{{ profileForm.country }}</span>
          </div>
          <div class="form-group tfa-group">
            <div class="tfa-header">
              <span class="tfa-label">Two-Factor Authentication</span>
              <span class="tfa-status">{{ twoFactorEnabled ? 'On' : 'Off' }}</span>
            </div>
            <label class="toggle-switch" for="tfa-toggle">
              <input type="checkbox" id="tfa-toggle" [(ngModel)]="twoFactorEnabled">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- Right Column: Preferences -->
      <div class="column">
        <h2 class="section-title">Preferences</h2>

        <div class="preference-row">
          <div class="preference-item">
            <span class="preference-label">Offline Mode</span>
            <label class="toggle-switch" for="offline-toggle">
              <input type="checkbox" id="offline-toggle" [(ngModel)]="offlineMode">
              <span class="slider"></span>
            </label>
          </div>
          <div class="preference-item">
            <select [(ngModel)]="selectedCurrency" class="currency-select">
              <option value="MAD">MAD - Moroccan Dirham</option>
              <option value="USD">USD - US Dollar</option>
              <option value="EUR">EUR - Euro</option>
              <option value="GBP">GBP - British Pound</option>
            </select>
          </div>
        </div>

        <div class="preference-row">
          <div class="preference-item">
            <span class="preference-label">Currency</span>
            <label class="toggle-switch" for="currency-toggle">
              <input type="checkbox" id="currency-toggle" [(ngModel)]="currencyToggle">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="profile-footer">
      <div class="security-badge">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
        </svg>
        <span>Your data is encrypted and protected</span>
      </div>
      <div class="action-buttons">
        <button class="btn-cancel" *ngIf="isEditMode" (click)="cancelChanges()">Cancel</button>
        <button class="btn-save" *ngIf="isEditMode" (click)="saveChanges()">Save</button>
      </div>
    </div>
  </div>
</div>
